<svg width="720" height="480" viewBox="0 0 720 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Live chat integration illustration</title>
  <desc id="desc">Layered screens and messaging bubbles representing connected customer conversations.</desc>
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#081028" />
      <stop offset="100%" stop-color="#173354" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#32B5F1" />
      <stop offset="100%" stop-color="#7D5CFE" />
    </linearGradient>
    <linearGradient id="bubbleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F7FF" />
      <stop offset="100%" stop-color="#C8E1FF" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#050914" flood-opacity="0.35" />
    </filter>
  </defs>
  <rect width="720" height="480" fill="url(#bgGradient)" />
