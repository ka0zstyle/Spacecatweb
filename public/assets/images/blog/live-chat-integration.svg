    <rect x="512" y="136" width="88" height="28" rx="8" fill="url(#accentGradient)" />
    <rect x="512" y="178" width="88" height="12" rx="6" fill="#234E80" />
    <rect x="512" y="200" width="88" height="12" rx="6" fill="#234E80" />
    <rect x="512" y="222" width="88" height="12" rx="6" fill="#234E80" />
